parameters:
    fos_oauth_server.server.class: "OAuth2\\OAuth2"

services:
    fos_oauth_server.storage.default:
        class: "FOS\\OAuthServerBundle\\Storage\\OAuthStorage"
        public: false
        arguments:
            - "@fos_oauth_server.client_manager"
            - "@fos_oauth_server.access_token_manager"
            - "@fos_oauth_server.refresh_token_manager"
            - "@fos_oauth_server.auth_code_manager"
            - "@?fos_oauth_server.user_provider"
            - "@security.password_hasher_factory"

    fos_oauth_server.server:
        class: "%fos_oauth_server.server.class%"
        arguments:
            - "@fos_oauth_server.storage"
            - "%fos_oauth_server.server.options%"
            - "@event_dispatcher"

    FOS\OAuthServerBundle\Controller\TokenController:
        class: "FOS\\OAuthServerBundle\\Controller\\TokenController"
        arguments:
            - "@fos_oauth_server.server"

    fos_oauth_server.controller.token:
        alias: "FOS\\OAuthServerBundle\\Controller\\TokenController"
        public: true

    fos_oauth_server.clean_command:
        class: "FOS\\OAuthServerBundle\\Command\\CleanCommand"
        arguments:
            - "@fos_oauth_server.access_token_manager"
            - "@fos_oauth_server.refresh_token_manager"
            - "@fos_oauth_server.auth_code_manager"
        tags:
            - { name: console.command }

    fos_oauth_server.create_client_command:
        class: "FOS\\OAuthServerBundle\\Command\\CreateClientCommand"
        arguments:
            - "@fos_oauth_server.client_manager"
        tags:
            - { name: console.command }

    fos_oauth_server.routing.deprecated_xml_loader:
        class: "FOS\\OAuthServerBundle\\Routing\\DeprecatedXmlFileLoader"
        arguments:
            - "@file_locator"
        tags:
            - { name: routing.loader, priority: 1 }