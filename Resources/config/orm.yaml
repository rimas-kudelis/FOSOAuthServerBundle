services:
    fos_oauth_server.client_manager.default:
        class: "FOS\\OAuthServerBundle\\Entity\\ClientManager"
        arguments:
            - "@fos_oauth_server.entity_manager"
            - "%fos_oauth_server.model.client.class%"

    fos_oauth_server.access_token_manager.default:
        class: "FOS\\OAuthServerBundle\\Entity\\AccessTokenManager"
        arguments:
            - "@fos_oauth_server.entity_manager"
            - "%fos_oauth_server.model.access_token.class%"

    fos_oauth_server.refresh_token_manager.default:
        class: "FOS\\OAuthServerBundle\\Entity\\RefreshTokenManager"
        arguments:
            - "@fos_oauth_server.entity_manager"
            - "%fos_oauth_server.model.refresh_token.class%"

    fos_oauth_server.auth_code_manager.default:
        class: "FOS\\OAuthServerBundle\\Entity\\AuthCodeManager"
        arguments:
            - "@fos_oauth_server.entity_manager"
            - "%fos_oauth_server.model.auth_code.class%"

    fos_oauth_server.entity_manager:
        class: "Doctrine\\ORM\\EntityManager"
        public: false
        arguments:
            - "%fos_oauth_server.model_manager_name%"

    FOS\OAuthServerBundle\Model\ClientManagerInterface:
        alias: "fos_oauth_server.client_manager.default"
    FOS\OAuthServerBundle\Model\AccessTokenManagerInterface:
        alias: "fos_oauth_server.access_token_manager.default"
    FOS\OAuthServerBundle\Model\RefreshTokenManagerInterface:
        alias: "fos_oauth_server.refresh_token_manager.default"
    FOS\OAuthServerBundle\Model\AuthCodeManagerInterface:
        alias: "fos_oauth_server.auth_code_manager.default"
